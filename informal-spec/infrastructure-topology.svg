<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <style>
      .box { fill: #f8f9fa; stroke: #333; stroke-width: 1.5; rx: 6; }
      .title { font-weight: 600; font-size: 14px; }
      .detail { fill: #555; font-size: 12px; }
      .label { font-size: 11px; fill: #666; }
      .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .line { stroke: #333; stroke-width: 1.5; fill: none; }
      .bidir { stroke: #333; stroke-width: 1.5; fill: none; marker-start: url(#arrowhead-rev); marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <marker id="arrowhead-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#333"/>
    </marker>
  </defs>

  <!-- SpacetimeDB Box -->
  <rect class="box" x="120" y="20" width="560" height="150"/>
  <text class="title" x="400" y="48" text-anchor="middle">SpacetimeDB Instance</text>
  <text class="detail" x="400" y="68" text-anchor="middle">(transient, one per active game)</text>
  <text class="detail" x="150" y="92">TypeScript module: snake game logic</text>
  <text class="detail" x="150" y="110">Scheduled reducer: turn resolution</text>
  <text class="detail" x="150" y="128">Tables: snakes, staged_moves, board, events</text>
  <text class="detail" x="150" y="146">Team permissions for move staging</text>

  <!-- Bidirectional lines from SpacetimeDB to middle boxes -->
  <path class="bidir" d="M 280,170 L 280,260"/>
  <text class="label" x="290" y="220">WebSocket</text>

  <path class="bidir" d="M 540,170 L 540,260"/>
  <text class="label" x="550" y="220">WebSocket</text>

  <!-- Centaur Server Box -->
  <rect class="box" x="80" y="260" width="280" height="180"/>
  <text class="title" x="220" y="288" text-anchor="middle">Centaur Server A</text>
  <text class="detail" x="100" y="312">← game state (WS)</text>
  <text class="detail" x="100" y="330">→ staged moves (WS)</text>
  <text class="detail" x="100" y="348">← Convex (config)</text>
  <text class="detail" x="100" y="366">→ Convex (snake config)</text>
  <text class="detail" x="100" y="390">Bot computation</text>
  <text class="detail" x="100" y="410">Serves operator UI</text>

  <!-- Human Web Client Box -->
  <rect class="box" x="440" y="260" width="280" height="180"/>
  <text class="title" x="580" y="288" text-anchor="middle">Human Web Client</text>
  <text class="detail" x="460" y="312">← game state (WS)</text>
  <text class="detail" x="460" y="330">→ staged moves (WS)</text>
  <text class="detail" x="460" y="348">← Convex (snake config)</text>
  <text class="detail" x="460" y="366">→ Convex (drives)</text>
  <text class="detail" x="460" y="400">Served by Centaur</text>
  <text class="detail" x="460" y="418">Server (custom UI)</text>

  <!-- HTTP arrow from Centaur Server to Human Web Client -->
  <path class="arrow" d="M 360,400 L 432,400"/>
  <text class="label" x="388" y="393">HTTP</text>

  <!-- Bidirectional lines from middle boxes to Convex -->
  <path class="bidir" d="M 280,440 L 280,540"/>
  <text class="label" x="290" y="498">Convex client</text>

  <path class="bidir" d="M 540,440 L 540,540"/>
  <text class="label" x="550" y="498">Convex client</text>

  <!-- Convex Box -->
  <rect class="box" x="80" y="540" width="640" height="170"/>
  <text class="title" x="400" y="568" text-anchor="middle">Convex Instance</text>
  <text class="detail" x="100" y="592">User accounts (Google OAuth)</text>
  <text class="detail" x="100" y="610">Rooms &amp; game history</text>
  <text class="detail" x="100" y="628">Centaur Server registry</text>
  <text class="detail" x="100" y="646">Per-team: snake config, drives, bot params</text>
  <text class="detail" x="100" y="664">Per-team: interaction logs</text>
  <text class="detail" x="100" y="682">Replay snapshots</text>
  <text class="detail" x="100" y="700">JWT issuing (JWKS + challenge-callback)</text>
</svg>
